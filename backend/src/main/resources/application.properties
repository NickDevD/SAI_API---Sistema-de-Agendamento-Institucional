
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/POSTGRES_DB_NAME}}

spring.datasource.username=${SPRING_DATASOURCE_USERNAME:POSTGRES_USER}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:POSTGRES_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

api.security.token.secret=${JWT_SECRET:JWT_SECRET_KEY}

server.port=${PORT:8080}

spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}