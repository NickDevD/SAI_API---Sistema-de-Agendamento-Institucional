
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/agendamento_db}}

spring.datasource.username=${SPRING_DATASOURCE_USERNAME:POSTGRES_USER}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:POSTGRES_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.placeholders.ADMIN_LOGIN=${FLYWAY_PLACEHOLDERS_ADMIN_LOGIN}
spring.flyway.placeholders.ADMIN_PASSWORD_HASH=${FLYWAY_PLACEHOLDERS_ADMIN_PASSWORD_HASH}
ADMIN_LOGIN=${ADMIN_LOGIN}
ADMIN_PASSWORD_LINE=${ADMIN_PASSWORD_LINE}

api.security.token.secret=${JWT_SECRET:JWT_SECRET}

server.port=${PORT:8080}
