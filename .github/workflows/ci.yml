name: CI/CD Backend

on:
  push:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v3

      - name: ☕ Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 📦 Build com Maven
        run: cd backend && mvn clean package -DskipTests

      - name: 🐳 Build da imagem Docker
        run: docker build -t backend-api ./backend

      - name: 🚀 Teste do container
        run: |
          CONTAINER_ID=$(docker run -d -p 8080:8080 \
          -e SPRING_DATASOURCE_URL=jdbc:h2:mem:testdb \
          -e SPRING_FLYWAY_ENABLED=false \
          -e API_SECURITY_TOKEN_SECRET=teste \
          backend-api)

          sleep 30

          curl -f http://localhost:8080 || (docker logs $CONTAINER_ID && exit 1)

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 🚀 Deploy no Render
        run: |
          curl -X POST https://api.render.com/v1/services/srv-d7ardcaa214c73cf0tvg/deploys \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}"