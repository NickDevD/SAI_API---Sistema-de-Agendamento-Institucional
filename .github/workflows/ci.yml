name: CI/CD Backend

on:
  push:
    branches: ["main"]

jobs:

  # 🟢 1. BUILD + TESTES
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v3

      - name: ☕ Java 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      - name: 🧪 Build + Test
        run: |
          cd backend
          mvn clean verify
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/testdb
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          SPRING_FLYWAY_ENABLED: true

  # 🟡 2. DOCKER BUILD + PUSH
  docker:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v3

      - name: 🔑 Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🐳 Build image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/backend-api ./backend

      - name: 📤 Push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/backend-api

  # 🔵 3. DEPLOY (Render)
  deploy:
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Deploy no Render
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}